modules:
  - name: config
    path: src/config/
    purpose: 환경변수, DB/Redis 연결 설정, 앱 설정
    depends_on: []
    notes: |
      - 환경별 .env 로딩 (.env.local, .env.dev, .env.prod)
      - **변경 시 반드시 사용자 승인 필요**

  - name: controllers
    path: src/controllers/
    purpose: HTTP 요청/응답 처리. 입력 검증 후 service 호출
    depends_on: [services, middlewares, utils]
    notes: |
      - 비즈니스 로직 금지 (services로 위임)
      - response.ts 헬퍼 사용 (successResponse / errorResponse)
      - ApiError 계층으로 에러 throw

  - name: services
    path: src/services/
    purpose: 비즈니스 로직 (도메인 단위)
    depends_on: [repositories, utils]
    notes: |
      - 트랜잭션 경계 정의
      - ApiError 계층으로 예외 throw
      - 단일 책임 원칙

  - name: repositories
    path: src/repositories/
    purpose: DB 접근 (parameterized SQL)
    depends_on: [database]
    notes: |
      - SQL injection 방지: ? 바인딩만 사용
      - controller/service에서 직접 SQL 실행 금지
      - 메서드명은 동사 시작 (find/insert/update/delete)

  - name: middlewares
    path: src/middlewares/
    purpose: 인증/권한/에러 핸들링/로깅 cross-cutting
    depends_on: [utils]
    notes: |
      - JWT 검증 미들웨어 (메인 BE 시그니처 공유)
      - error handler (ApiError → 표준 응답)
      - 라우터 레벨에서 명시적으로 적용

  - name: routes
    path: src/routes/
    purpose: Express 라우터 정의 (도메인별 모듈)
    depends_on: [controllers, middlewares]
    notes: |
      - 도메인별 라우터 모듈
      - permission 미들웨어 명시적 부착

  - name: websocket
    path: src/websocket/
    purpose: Socket.io 이벤트 핸들러
    depends_on: [services, middlewares]
    notes: |
      - 실시간 이벤트 처리
      - Socket.io 인증 미들웨어
      - 다중 replica 시 Redis adapter 사용

  - name: utils
    path: src/utils/
    purpose: 공통 유틸 (response, errors, logger 등)
    depends_on: []
    notes: |
      - response.ts: successResponse, errorResponse 표준 포맷
      - errors.ts: ApiError 계층 (400~503)
      - logger: console 직접 사용 금지

  - name: types
    path: src/types/
    purpose: 공유 TypeScript 타입 정의
    depends_on: []
    notes: |
      - 도메인 타입, API 응답 타입, 이벤트 페이로드 타입

  - name: database
    path: src/database/
    purpose: DB 연결, 마이그레이션, connection pool
    depends_on: []
    notes: |
      - migration 스크립트 (npm run migrate)
      - connection pool 설정
